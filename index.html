<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Calendar showing commemorative days and annual events."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Days Calendar</title>

    <link rel="stylesheet" href="./styles.css" />

    <script type="module" src="./web.mjs"></script>
  </head>
  <body>
    <main>
      <h1>Days Calendar</h1>

      <div>
        <button id="prev-month" aria-label="Previous month">Previous</button>
        <label for="month-select">Month:</label>
        <select id="month-select"></select>

        <label for="year-select">Year:</label>
        <select id="year-select"></select>

        <button id="next-month" aria-label="Next month">Next</button>
      </div>

      <div id="calendar"></div>
    </main>
  </body>
</html>
